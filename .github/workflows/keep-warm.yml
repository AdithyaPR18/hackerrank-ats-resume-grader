name: keep-warm

# Pings the Render free-tier backend so it doesn't sleep (and cold-start) between
# visits. Best-effort: GitHub may delay scheduled runs, and disables schedules
# after ~60 days of repo inactivity. For a rock-solid keep-alive, also point a
# free uptime monitor (e.g. UptimeRobot) at /health every 5 minutes.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: curl -fsS -m 60 https://resume-grader-api.onrender.com/health || true
